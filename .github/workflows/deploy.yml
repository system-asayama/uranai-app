name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (production)
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST_PRODUCTION }}
          username: ${{ secrets.SSH_USER_PRODUCTION }}
          port: ${{ secrets.SSH_PORT_PRODUCTION }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
          envs: GITHUB_TOKEN
          script: |
            echo "[DEBUG] target_dir=~/apps/uranai-app" && echo "[DEBUG] full_name=system-asayama/uranai-app" && echo "[DEBUG] branch=main" && echo "[DEBUG] deploy_mode=docker-compose" && echo "[DEBUG] hostname=$(hostname)" && echo "[DEBUG] whoami=$(whoami)" && echo "[DEBUG] git --version: $(git --version 2>&1)" && echo "[DEBUG] docker --version: $(docker --version 2>&1)" && echo "[DEBUG] docker compose version: $(docker compose version 2>&1)" && echo "[DEBUG] dir exists? $(test -d ~/apps/uranai-app && echo YES || echo NO)" && echo "[DEBUG] .git exists? $(test -d ~/apps/uranai-app/.git && echo YES || echo NO)" && if [ -d ~/apps/uranai-app/.git ]; then echo "[DEBUG] taking git pull path" && cd ~/apps/uranai-app && git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/uranai-app.git && echo "[DEBUG] git remote URL updated" && git fetch origin main && echo "[DEBUG] git fetch origin main OK" && git checkout -B main origin/main && echo "[DEBUG] checkout & reset to origin/main OK" && echo "[DEBUG] git pull OK"; else echo "[DEBUG] taking git clone path" && mkdir -p "$(dirname ~/apps/uranai-app)" && rm -rf ~/apps/uranai-app && git clone --branch main https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/system-asayama/uranai-app.git ~/apps/uranai-app && echo "[DEBUG] git clone OK"; fi && echo "[DEBUG] post-pull, ls ~/apps/uranai-app:" && ls -la ~/apps/uranai-app | head -20 && cd ~/apps/uranai-app && echo "[DEBUG] in ~/apps/uranai-app, WEB_PORT=8003" && echo "[DEBUG] compose files:" && ls -la docker-compose* compose* 2>/dev/null && echo "[DEBUG] git HEAD: $(git rev-parse --short HEAD 2>/dev/null || echo no-git)" && echo "[DEBUG] pulling base images for dependent services..." && WEB_PORT=8003 docker compose pull 2>/dev/null || true; echo "[DEBUG] building web image with --no-cache --pull (= 新コード確実反映)..." && WEB_PORT=8003 docker compose build --pull --no-cache web && echo "[DEBUG] starting containers with --force-recreate..." && WEB_PORT=8003 docker compose up -d --force-recreate --remove-orphans && echo "[DEBUG] docker ps:" && docker ps --filter "label=com.docker.compose.project" --format "{{.Names}}\t{{.Status}}\t{{.Ports}}"
