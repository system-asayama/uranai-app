{% extends "base.html" %}
{% block title %}六十干支 早見表{% endblock %}
{% block content %}
<div class="card">
  <h1>六十干支 早見表（60パターン）</h1>
  <p class="muted">四柱推命の日柱で用いる六十干支の一覧です。</p>
  <p><a class="link" href="{{ url_for('uranai') }}">◀ 占いに戻る</a></p>
</div>

<div class="grid">
  {% for f in fortunes %}
  <div class="card mini el-{{ f.element }}">
    <div class="mini-head">
      <span class="no">No.{{ f.index + 1 }}</span>
      <span class="name">{{ f.name }}</span>
    </div>
    <div class="yomi muted">{{ f.yomi }}・{{ f.element }}（{{ f.yinyang }}）</div>
    <p class="catch">{{ f.catch }}</p>
  </div>
  {% endfor %}
</div>

<style>
  .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
          gap:14px; }
  .mini { margin-bottom:0; border-left:6px solid #ccc; padding:16px; }
  .mini-head { display:flex; align-items:baseline; gap:8px; }
  .mini .no { font-size:12px; color:var(--muted); }
  .mini .name { font-size:24px; font-weight:800; letter-spacing:2px; }
  .mini .yomi { font-size:12px; margin:2px 0 8px; }
  .mini .catch { font-size:13px; margin:0; }
  .el-木 { border-left-color:#37b24d; }
  .el-火 { border-left-color:#f03e3e; }
  .el-土 { border-left-color:#f59f00; }
  .el-金 { border-left-color:#adb5bd; }
  .el-水 { border-left-color:#1c7ed6; }
</style>
{% endblock %}
